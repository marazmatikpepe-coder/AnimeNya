<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeNya — Смотри аниме онлайн</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <img src="https://rpc.alice.yandex.ru/gproxy/get_preview_url?FileGuid=b8868072-79ed11f1-99342f55-898eb994" alt="AnimeNya" onerror="this.style.display='none'">
                <span class="logo-text">AnimeNya</span>
            </a>
            <ul class="nav-links">
                <li><a href="#" class="active" data-nav="home">🏠 Главная</a></li>
                <li><a href="#" data-nav="popular">🔥 Популярное</a></li>
                <li><a href="#" data-nav="new">🆕 Новинки</a></li>
                <li><a href="#" data-nav="genres">🎭 Жанры</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <button class="btn-search" id="btn-search" title="Поиск">🔍</button>
            <button class="btn-admin" id="btn-admin" title="Админ-панель">⚙️</button>
            <button class="btn-user" id="btn-user">🔑 Войти</button>
        </div>
    </nav>

    <!-- ===== SEARCH OVERLAY ===== -->
    <div class="search-overlay" id="search-overlay">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="🔍 Найти аниме...">
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <!-- ===== HERO BANNER ===== -->
    <section class="hero" id="hero">
        <div class="hero-bg">
            <img id="hero-img" src="" alt="">
        </div>
        <div class="hero-gradient"></div>
        <div class="hero-content">
            <div class="hero-badge" id="hero-badge">🌟 ТОП АНИМЕ</div>
            <h1 class="hero-title" id="hero-title">Загрузка...</h1>
            <div class="hero-meta">
                <span id="hero-year">2024</span>
                <span>•</span>
                <span class="hero-rating" id="hero-rating">⭐ 0.0</span>
                <span>•</span>
                <span id="hero-genre">Аниме</span>
            </div>
            <p class="hero-desc" id="hero-desc">Загрузка описания...</p>
            <div class="hero-buttons">
                <button class="btn-play" id="btn-hero-play">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    Смотреть
                </button>
                <button class="btn-info" id="btn-hero-info">
                    ℹ️ Подробнее
                </button>
            </div>
        </div>
    </section>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" id="main-content">
        <!-- Секции рендерятся динамически -->
    </main>

    <!-- ===== DETAIL MODAL ===== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close">✕</button>
            <div class="modal-hero">
                <img id="modal-img" src="" alt="">
                <div class="modal-hero-gradient"></div>
            </div>
            <div class="modal-body">
                <h2 class="modal-title" id="modal-title"></h2>
                <div class="modal-meta-row">
                    <span id="modal-year"></span>
                    <span>•</span>
                    <span class="rating" id="modal-rating">⭐ 0.0</span>
                    <span>•</span>
                    <span id="modal-genre"></span>
                </div>
                <p class="modal-desc" id="modal-desc"></p>
                <div class="stars-row" id="modal-stars"></div>
                <div class="modal-buttons">
                    <button class="btn-play" id="btn-modal-play">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M8 5v14l11-7z"/></svg>
                        Смотреть
                    </button>
                    <button class="btn-info modal-close-btn">✕ Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== PLAYER OVERLAY ===== -->
    <div class="player-overlay" id="player-overlay">
        <button class="player-close" id="player-close">✕ ЗАКРЫТЬ</button>
        <iframe id="player-frame" src="" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
