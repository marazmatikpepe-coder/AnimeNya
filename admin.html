<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — AnimeNya</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: rgba(22, 22, 30, 0.7);
            --glass: rgba(18, 18, 24, 0.85);
            --glass-border: rgba(255, 255, 255, 0.06);
            --accent: #a855f7;
            --accent2: #6366f1;
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 24px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 50%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.25); border-radius: 3px; }

        /* ===== HEADER ===== */
        .admin-header {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .admin-logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-back {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ccc;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .btn-refresh {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.2);
            color: #c4b5fd;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition);
        }

        .btn-refresh:hover {
            background: rgba(168, 85, 247, 0.3);
            transform: rotate(90deg);
        }

        /* ===== MAIN LAYOUT ===== */
        .admin-body {
            display: grid;
            grid-template-columns: 340px 1fr;
            height: calc(100vh - 81px);
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .admin-sidebar {
            background: rgba(15, 15, 22, 0.7);
            border-right: 1px solid var(--glass-border);
            padding: 24px;
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 28px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .sidebar-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-item {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 500;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
            background: transparent;
        }

        .sidebar-item:hover {
            background: rgba(255,255,255,0.03);
            color: #fff;
        }

        .sidebar-item.active {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.3);
            color: #fff;
        }

        .sidebar-item .icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-item .count {
            margin-left: auto;
            background: rgba(255,255,255,0.06);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: #888;
        }

        /* ===== CONTENT AREA ===== */
        .admin-content {
            padding: 32px 40px;
            overflow-y: auto;
            background: rgba(10, 10, 15, 0.5);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .content-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.5);
        }

        /* ===== GRID ===== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }

        .content-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .content-card:hover {
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }

        .content-card.selected {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .card-poster {
            aspect-ratio: 16/10;
            background: #1a1a2e;
            overflow: hidden;
            position: relative;
        }

        .card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .content-card:hover .card-poster img {
            transform: scale(1.05);
        }

        .card-type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        .badge-anime { background: rgba(168, 85, 247, 0.8); color: #fff; }
        .badge-series { background: rgba(59, 130, 246, 0.8); color: #fff; }
        .badge-season { background: rgba(34, 197, 94, 0.8); color: #fff; }
        .badge-episode { background: rgba(251, 146, 60, 0.8); color: #fff; }

        .card-body {
            padding: 14px 16px;
        }

        .card-name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }

        .card-meta {
            font-size: 12px;
            color: #888;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .card-rating-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            color: #fbbf24;
            font-weight: 600;
        }

        .card-children-count {
            font-size: 11px;
            color: #a78bfa;
            margin-top: 6px;
        }

        /* ===== TABLE (для серий) ===== */
        .episodes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .episodes-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
        }

        .episodes-table td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .episodes-table tr {
            cursor: pointer;
            transition: var(--transition);
        }

        .episodes-table tr:hover {
            background: rgba(168, 85, 247, 0.05);
        }

        .episodes-table tr.selected {
            background: rgba(168, 85, 247, 0.1);
        }

        /* ===== CONTEXT MENU ===== */
        .context-menu {
            position: fixed;
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            z-index: 10000;
            min-width: 200px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            display: none;
            animation: contextIn 0.15s ease;
        }

        @keyframes contextIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .context-menu .menu-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
        }

        .context-menu .menu-item:hover {
            background: rgba(168, 85, 247, 0.15);
            color: #fff;
        }

        .context-menu .menu-item.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .context-menu .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 6px 8px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a24;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn 0.25s ease;
            box-shadow: 0 30px 70px rgba(0,0,0,0.7);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 24px 28px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .modal-body {
            padding: 24px 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(30, 30, 40, 0.7);
            border: 2px solid rgba(255,255,255,0.08);
            color: #fff;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: var(--transition);
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }

        .btn-submit:hover {
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
        }

        .btn-danger {
            padding: 10px 20px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: #fff;
            padding: 14px 28px;
            border-radius: 25px;
            font-weight: 600;
            z-index: 9999;
            display: none;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
            flex-wrap: wrap;
        }

        .breadcrumb span {
            cursor: pointer;
            transition: 0.2s;
        }

        .breadcrumb span:hover {
            color: #c4b5fd;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .admin-body {
                grid-template-columns: 1fr;
            }
            .admin-sidebar {
                display: none;
            }
            .admin-content {
                padding: 20px 16px;
            }
            .content-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 10px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <div class="admin-header">
        <span class="admin-logo">⚙️ AnimeNya Admin</span>
        <div class="admin-actions">
            <button class="btn-refresh" id="btn-refresh" title="Обновить">🔄</button>
            <a href="index.html" class="btn-back">← На главную</a>
        </div>
    </div>

    <!-- ===== BODY ===== -->
    <div class="admin-body">
        <!-- SIDEBAR -->
        <div class="admin-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Контент</div>
                <ul class="sidebar-list">
                    <li class="sidebar-item active" data-type="anime">
                        <span class="icon">🎬</span> Аниме / Фильмы
                        <span class="count" id="count-anime">0</span>
                    </li>
                    <li class="sidebar-item" data-type="series">
                        <span class="icon">📺</span> Сериалы
                        <span class="count" id="count-series">0</span>
                    </li>
                </ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Быстрые действия</div>
                <ul class="sidebar-list">
                    <li class="sidebar-item" id="sidebar-add-anime">
                        <span class="icon">➕</span> Добавить аниме
                    </li>
                    <li class="sidebar-item" id="sidebar-add-series">
                        <span class="icon">➕</span> Добавить сериал
                    </li>
                </ul>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="admin-content" id="admin-content">
            <div class="content-header">
                <h2 class="content-title" id="content-title">🎬 Аниме / Фильмы</h2>
                <button class="btn-add" id="btn-add">➕ Добавить аниме</button>
            </div>
            <div class="breadcrumb" id="breadcrumb"></div>
            <div class="content-grid" id="content-grid">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== CONTEXT MENU ===== -->
    <div class="context-menu" id="context-menu">
        <div class="menu-item" data-action="edit">✏️ Изменить</div>
        <div class="menu-item" data-action="open-children">📂 Открыть</div>
        <div class="menu-divider"></div>
        <div class="menu-item danger" data-action="delete">🗑️ Удалить</div>
    </div>

    <!-- ===== EDIT/CREATE MODAL ===== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">Добавить аниме</h3>
                <button class="modal-close" id="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <form id="modal-form">
                    <input type="hidden" id="form-id">
                    <input type="hidden" id="form-type" value="anime">
                    <input type="hidden" id="form-parent">

                    <div class="form-group">
                        <label>Название *</label>
                        <input type="text" id="form-title" required>
                    </div>

                    <div class="form-group">
                        <label>Постер (URL) *</label>
                        <input type="url" id="form-poster" required>
                    </div>

                    <div class="form-group" id="group-url">
                        <label>Ссылка на видео *</label>
                        <input type="url" id="form-url">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Год</label>
                            <input type="text" id="form-year" value="2024">
                        </div>
                        <div class="form-group">
                            <label>Жанр</label>
                            <input type="text" id="form-genre" placeholder="Сёнэн, Романтика...">
                        </div>
                    </div>

                    <div class="form-group" id="group-epnum" style="display:none;">
                        <label>Номер серии</label>
                        <input type="number" id="form-episode-number" value="1">
                    </div>

                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="form-desc" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn-submit" id="btn-submit">💾 Сохранить</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
